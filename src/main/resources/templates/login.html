<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - GastroSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body class="bg-light align-items-center justify-content-center" style="display: flex;">

<div class="container py-5 animate-fade-in">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="text-center mb-4">
                <h1 class="gastro-title display-5 text-primary mb-1">GastroSystem</h1>
                <p class="text-muted">Plataforma Inteligente de Gestión Gastronómica</p>
            </div>

            <div class="card gastro-card shadow-lg p-4">
                <h2 class="h4 text-center mb-4 font-semibold">Iniciar Sesión</h2>

                <!-- Alerts -->
                <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    ¡Registro exitoso! Ya puedes iniciar sesión.
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                
                <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    Usuario o contraseña incorrectos.
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div th:if="${loginSuccess}" class="alert alert-info alert-dismissible fade show" role="alert">
                    <span th:text="${loginSuccess}">Mensaje</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label font-medium">Nombre de usuario</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Ingrese su usuario" required autofocus autocomplete="username">
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label font-medium">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-gastro-primary py-2 btn-block">Ingresar</button>
                    </div>
                </form>

                <hr class="my-4">

                <div class="text-center">
                    <p class="mb-0 text-muted">¿No tienes una cuenta? <a th:href="@{/registro}" class="text-primary fw-bold text-decoration-none">Regístrate aquí</a></p>
                </div>
            </div>

            <div class="text-center mt-4">
                <small class="text-muted">Desarrollado para dbappetit &copy; 2026</small>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
