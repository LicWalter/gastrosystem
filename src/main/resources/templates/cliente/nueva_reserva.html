<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Reserva - GastroSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg gastro-nav navbar-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/cliente}">GastroSystem</a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="btn btn-sm btn-outline-light" th:href="@{/cliente}">Volver al Panel</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container dashboard-container animate-fade-in">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-lg p-4 bg-white rounded-4">
                <h1 class="h3 mb-3 text-center gastro-title text-primary">Reservar una Mesa</h1>
                <p class="text-center text-muted mb-4">Ingresa los detalles para tu reserva. Nuestro equipo confirmará tu mesa a la brevedad.</p>

                <form th:action="@{/cliente/reserva/guardar}" method="post">
                    <div class="mb-3">
                        <label for="fechaHoraStr" class="form-label font-medium">Fecha y Hora de la Reserva</label>
                        <input type="datetime-local" class="form-control" id="fechaHoraStr" name="fechaHoraStr" required>
                        <div class="form-text">Por favor selecciona un horario de atención válido (12:00 PM a 10:00 PM).</div>
                    </div>

                    <div class="mb-4">
                        <label for="numeroPersonas" class="form-label font-medium">Número de personas</label>
                        <input type="number" class="form-control" id="numeroPersonas" name="numeroPersonas" min="1" max="20" placeholder="Ej. 4" required>
                        <div class="form-text">Para grupos de más de 20 personas, contáctanos directamente.</div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-gastro-primary py-2">Confirmar Reserva</button>
                        <a th:href="@{/cliente}" class="btn btn-outline-secondary py-2">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
