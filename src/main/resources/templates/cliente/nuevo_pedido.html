<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Pedido - GastroSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg gastro-nav navbar-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/cliente}">GastroSystem</a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="btn btn-sm btn-outline-light" th:href="@{/cliente}">Volver al Panel</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container dashboard-container animate-fade-in">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-lg p-4 bg-white rounded-4">
                <h1 class="h3 mb-2 text-center gastro-title text-primary">Realizar Pedido a Domicilio</h1>
                <p class="text-center text-muted mb-4">Selecciona tus platos favoritos del menú e ingresa la dirección de entrega.</p>

                <div th:if="${pedidoError}" class="alert alert-danger" role="alert" th:text="${pedidoError}">
                    Error
                </div>

                <form th:action="@{/cliente/pedido/guardar}" method="post">
                    <!-- Delivery Address -->
                    <div class="card p-3 border-0 bg-light rounded-3 mb-4">
                        <h3 class="h6 mb-2 font-semibold">Dirección de Entrega</h3>
                        <div>
                            <input type="text" class="form-control" id="direccionEntrega" name="direccionEntrega" 
                                   placeholder="Ej. Calle 100 # 15-30, Apto 402" required>
                        </div>
                    </div>

                    <!-- Products Table -->
                    <div class="table-responsive mb-4">
                        <table class="table align-middle">
                            <thead>
                                <tr>
                                    <th>Categoría</th>
                                    <th>Plato / Producto</th>
                                    <th>Descripción</th>
                                    <th>Precio</th>
                                    <th style="width: 100px;">Cantidad</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="plato, iterStat : ${platos}">
                                    <!-- Hidden platoId to sync index with quantity -->
                                    <input type="hidden" name="platoIds" th:value="${plato.idPlato}"/>
                                    
                                    <td>
                                        <span class="badge bg-secondary text-capitalize" th:text="${plato.categoria.nombre.toLowerCase()}">Entrada</span>
                                    </td>
                                    <td class="fw-semibold" th:text="${plato.nombre}">Nombre Plato</td>
                                    <td class="text-muted small" th:text="${plato.descripcion}">Descripción</td>
                                    <td class="text-primary fw-bold" th:text="'$' + ${#numbers.formatDecimal(plato.precio, 1, 2)}">$0.00</td>
                                    <td>
                                        <input type="number" name="cantidades" class="form-control text-center" 
                                               value="0" min="0" max="99" required>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex gap-2 justify-content-end">
                        <a th:href="@{/cliente}" class="btn btn-outline-secondary px-4 py-2">Cancelar</a>
                        <button type="submit" class="btn btn-gastro-primary px-4 py-2">Confirmar y Enviar Pedido</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
