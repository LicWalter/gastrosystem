<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Plato - GastroSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg gastro-nav navbar-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/mesero}">GastroSystem - Mesero</a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="btn btn-sm btn-outline-light" th:href="@{/mesero/pedido/ver/{id}(id=${pedido.idPedido})}">Volver al Pedido</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container dashboard-container animate-fade-in">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-lg p-4 bg-white rounded-4">
                <h1 class="h3 mb-3 text-center gastro-title text-primary">Agregar Plato al Pedido</h1>
                <p class="text-center text-muted mb-4" th:text="'Mesa #' + ${pedido.mesa.numero} + ' - Pedido #' + ${pedido.idPedido}">Mesa #1 - Pedido #123</p>

                <form th:action="@{/mesero/pedido/ver/{id}/agregar/guardar(id=${pedido.idPedido})}" method="post">
                    
                    <div class="mb-3">
                        <label for="idPlato" class="form-label font-medium">Seleccionar Plato / Producto</label>
                        <select class="form-select" id="idPlato" name="idPlato" required>
                            <option value="" disabled selected>-- Elige un plato --</option>
                            <option th:each="plato : ${platos}" 
                                    th:value="${plato.idPlato}" 
                                    th:text="${plato.nombre} + ' - $' + ${#numbers.formatDecimal(plato.precio, 1, 2)} + ' (' + ${plato.categoria.nombre} + ')'">
                                Plato Name
                            </option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="cantidad" class="form-label font-medium">Cantidad</label>
                        <input type="number" class="form-control" id="cantidad" name="cantidad" min="1" max="50" value="1" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-gastro-primary py-2">Agregar al Pedido</button>
                        <a th:href="@{/mesero/pedido/ver/{id}(id=${pedido.idPedido})}" class="btn btn-outline-secondary py-2">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
