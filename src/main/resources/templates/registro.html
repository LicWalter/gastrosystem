<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Cliente - Restaurante Appetit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body class="bg-light align-items-center justify-content-center" style="display: flex; min-height: 100vh;">

<div class="container py-5 animate-fade-in">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="text-center mb-4">
                <img th:src="@{/img/logocuadrado.png}" alt="Restaurante Appetitt" class="img-fluid mb-2" style="height: 240px; max-height: 240px; object-fit: contain;">
                <p class="text-muted">Crea tu cuenta para realizar pedidos y reservas</p>
            </div>

            <div class="card gastro-card shadow-lg p-4">
                <h2 class="h4 text-center mb-4">Registro de Cliente</h2>

                <div th:if="${registroError}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${registroError}">Error al registrar</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <form th:action="@{/registro/guardar}" th:object="${usuario}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre" th:field="*{nombre}" placeholder="Ej. Juan" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="apellido" class="form-label">Apellido</label>
                            <input type="text" class="form-control" id="apellido" th:field="*{apellido}" placeholder="Ej. Pérez" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="tipoDocumento" class="form-label">Tipo Documento</label>
                            <select class="form-select" id="tipoDocumento" th:field="*{tipoDocumento}">
                                <option value="C.C.">Cédula de Ciudadanía (C.C.)</option>
                                <option value="C.E.">Cédula de Extranjería (C.E.)</option>
                                <option value="Pasaporte">Pasaporte</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="numeroDocumento" class="form-label">Número Documento</label>
                            <input type="text" class="form-control" id="numeroDocumento" th:field="*{numeroDocumento}" placeholder="1234567890">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="juan.perez@example.com" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="username" class="form-label">Nombre de Usuario</label>
                            <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="juanperez" required autocomplete="username">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="••••••••" required autocomplete="new-password">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="telefono" class="form-label">Teléfono / Celular</label>
                            <input type="text" class="form-control" id="telefono" th:field="*{telefono}" placeholder="3001234567">
                        </div>
                        <div class="col-md-6 mb-4">
                            <label for="direccion" class="form-label">Dirección (Domicilios)</label>
                            <input type="text" class="form-control" id="direccion" th:field="*{direccion}" placeholder="Calle 123 # 45-67">
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-gastro-primary py-2">Registrarme</button>
                        <a th:href="@{/}" class="btn py-2" style="border: 1px solid var(--primary-color); color: var(--primary-color); background-color: transparent; font-weight: 600; transition: var(--transition);">← Volver al Inicio</a>
                    </div>
                </form>

                <hr class="my-4">

                <div class="text-center">
                    <p class="mb-0 text-muted">¿Ya tienes una cuenta? <a th:href="@{/login}" class="text-primary fw-bold text-decoration-none">Inicia sesión aquí</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
