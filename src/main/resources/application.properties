spring.application.name=gastrosystem

spring.datasource.url=jdbc:mariadb://localhost:3307/dbappetit?useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.show-sql=true
spring.jpa.open-in-view=true

# Logging para depuración de errores
logging.level.com.appetit.gastrosystem=DEBUG
logging.level.org.springframework.web=DEBUG